<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Produto</title>
</head>

<body class=" bg-gray-500 ">
    <main class="flex flex-col items-center justify-center h-screen gap-4">

        <h1 class="text-2xl">Lista de Produtos</h1>

        <input type="text" class=" border rounded px-8 py-2 bg-white" id="codigo" placeholder="Código do Produto">
        <input type="text" class=" border rounded px-8 py-2 bg-white" id="produto" placeholder="Nome do Produto">
        <input type="text" class=" border rounded px-8 py-2 bg-white" id="quantidade"
            placeholder="Quantidade do Produto">

        <div class="flex justify-between w-60">
            <button class="bg-blue-400 text-white px-4 py-2" onclick="adicionarProduto()">
                Adicionar
            </button>

            <button class="bg-blue-400 text-white px-4 py-2" onclick="apagarProduto()">
                apagar
            </button>
        </div>




        <div class=" bg-white h-screen w-screen  overflow-y-auto overflow-h-auto">
                <table class="w-full text-center border">
                    <thead class="bg-blue-300">
                        <tr>
                            <th>Código</th>
                            <th>Produto</th>
                            <th>Quantidade</th>
                        </tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
                
        </div>
    </main>
</body>

</html>
